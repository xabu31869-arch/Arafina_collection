<!DOCTYPE html>
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arafina Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:400px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h2{
margin-bottom:10px;
}

.price{
color:#d4af37;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.stock{
color:green;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
cursor:pointer;
border-radius:8px;
margin-top:10px;
}

button:hover{
background:#333;
}
</style>
</head>

<body>

<header>
<h1>ARAFINA COLLECTION</h1>
<p>Premium Abaya & Hijab Collection</p>
</header>

<section class="products">

<div class="card">
<img src="https://placehold.co/600x400">
<div class="card-content">
<h2>Arafina Collection</h2>
<p>Premium Abayalar</p>
<p>Yangi kolleksiya</p>
<div class="price">Narxlar mavjud</div>
<button>Telegram orqali buyurtma</button>
</div>
</div>

</section>
 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>



</body>

</html>
