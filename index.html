<!DOCTYPE html>
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arafina Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:400px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h2{
margin-bottom:10px;
}

.price{
color:#d4af37;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.stock{
color:green;
}

button{
width:100%;
padding:14px;
background:#0088cc;
color:white;
border:none;
cursor:pointer;
border-radius:8px;
font-size:16px;
font-weight:bold;
}

button:hover{
background:#333;
}
</style>
</head>

<body>

<header>
<h1>ARAFINA COLLECTION</h1>
<p>Premium Abaya & Hijab Collection</p>
</header>

<section class="products" id="products"></section>
 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>

const SUPABASE_URL = "https://xghqljlihzmjkdphpozv.supabase.co";
const SUPABASE_KEY = "sb_publishable_x34gtQp3XibHJW4-24Pznw_nw8xI-bu";
console.log("Supabase connected");
const productsDiv = document.getElementById("products");
const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);
async function loadProducts() {

const { data, error } = await supabase
.from("products")
.select("*");

if (error) {
console.error(error);
return;
}

productsDiv.innerHTML = "";

data.forEach(product => {
productsDiv.innerHTML += `
<div class="card">
<img src="${product.image_url}">
<div class="card-content">
<h2>${product.name}</h2>
<p>${product.fabric}</p>
<div class="price">${product.price.toLocaleString()} so'm</div>
<div class="stock">Omborda: ${product.stock} ta</div>

<a href="https://t.me/arafinaa_collection" target="_blank">
<button>Telegram orqali buyurtma</button>
</a>

<a href="https://instagram.com/arafina_collection" target="_blank">
<button style="background:#E1306C;margin-top:10px;">
Instagram sahifamiz
</button>
</a>

</div>
</div>
`;
});

}

 

loadProducts();
</script>
</body>
</html>
